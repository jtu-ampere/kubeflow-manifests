apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
# Application controller is used to provide Google Cloud Console integration.
- ../../third-party/application
- ../../base/application
- ../platform-agnostic
- ../gcp/inverse-proxy

images:
- name: ghcr.io/jtu-ampere/kfp-api-server
  newTag: master
- name: ghcr.io/jtu-ampere/kfp-frontend
  newTag: master
- name: ghcr.io/jtu-ampere/kfp-persistence-agent
  newTag: master
- name: ghcr.io/jtu-ampere/kfp-scheduled-workflow-controller
  newTag: master
- name: ghcr.io/jtu-ampere/kfp-cache-deployer
  newTag: master
- name: ghcr.io/jtu-ampere/kfp-cache-server
  newTag: master
- name: ghcr.io/jtu-ampere/kfp-metadata-envoy
  newTag: master
- name: ghcr.io/jtu-ampere/kfp-metadata-writer
  newTag: master
- name: ghcr.io/jtu-ampere/kfp-viewer-crd-controller
  newTag: master
- name: ghcr.io/jtu-ampere/kfp-visualization-server
  newTag: master
- name: ghcr.io/jtu-ampere/kfp-inverse-proxy-agent
  newTag: master

patches:
  - path: api-server-patch.yaml
# !!! If you want to customize the namespace,
# please refer sample/cluster-scoped-resources to update the namespace for cluster-scoped-resources
namespace: kubeflow
# Identifier for application manager to apply ownerReference.
# The ownerReference ensures the resources get garbage collected
# when application is deleted.
labels:
- includeSelectors: true
  pairs:
    application-crd-id: kubeflow-pipelines
